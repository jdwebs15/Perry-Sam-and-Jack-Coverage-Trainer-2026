<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Deuces Coverage — Sam & Jack Trainer</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#07111f;
  color:#fff;
}
.wrap{max-width:1100px;margin:auto;padding:20px;}
.hero{margin-bottom:20px;}
h1{margin:0;}
.field{
  background:#143f25;
  border-radius:12px;
  padding:10px;
}
.answer{margin:8px 0;padding:10px;border-radius:8px;border:1px solid #333;cursor:pointer}
.answer:hover{border-color:#38bdf8;}
.correct{background:#14532d;}
.wrong{background:#7f1d1d;}
</style>
</head>

<body>
<div class="wrap">

<h1>Deuces Coverage</h1>

<div id="app"></div>

</div>

<script>

const QUESTIONS = [
{
question:"Deuces-Match, 2x2. #2 vertical. What is Sam/Jack?",
answers:[
"Open to 2, feel 2, see 1, carry vertical 10–12, release, square, eyes QB",
"Blitz immediately",
"Jump #1 now",
"Run with #2 forever"
],
correct:0,
diagram:"vertical"
}
];

let index=0;

function render(){

let q=QUESTIONS[index];

document.getElementById("app").innerHTML=`
<div class="field">${diagram(q.diagram)}</div>
<h3>${q.question}</h3>
${q.answers.map((a,i)=>`<div class="answer" onclick="answer(${i})">${a}</div>`).join("")}
`;

}

function answer(i){

let q=QUESTIONS[index];
let nodes=[...document.querySelectorAll(".answer")];

nodes[q.correct].classList.add("correct");

if(i!==q.correct){
nodes[i].classList.add("wrong");
}

}

function diagram(type){

return `
<svg viewBox="0 0 900 450">

<!-- LOS -->
<line x1="50" y1="220" x2="850" y2="220" stroke="white" stroke-width="3"/>

<!-- OFFENSE -->
<text x="420" y="30" fill="white">OFFENSE</text>

<!-- #1 ON LOS -->
<circle cx="150" cy="200" r="18" fill="#7f1d1d"/>
<text x="140" y="205" fill="white">1</text>

<circle cx="750" cy="200" r="18" fill="#7f1d1d"/>
<text x="740" y="205" fill="white">1</text>

<!-- #2 OFF BALL -->
<circle cx="300" cy="150" r="18" fill="#7f1d1d"/>
<text x="290" y="155" fill="white">2</text>

<circle cx="600" cy="150" r="18" fill="#7f1d1d"/>
<text x="590" y="155" fill="white">2</text>

<!-- DEFENSE -->
<text x="420" y="430" fill="white">DEFENSE</text>

<!-- SAM/JACK APEX -->
<circle cx="300" cy="300" r="18" fill="#0f172a" stroke="#22c55e" stroke-width="3"/>
<text x="292" y="305" fill="white">S</text>

<circle cx="600" cy="300" r="18" fill="#0f172a" stroke="#22c55e" stroke-width="3"/>
<text x="592" y="305" fill="white">J</text>

<!-- CORNERS -->
<circle cx="150" cy="260" r="16" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
<circle cx="750" cy="260" r="16" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>

<!-- SAFETIES -->
<circle cx="350" cy="360" r="16" fill="#111827" stroke="#f59e0b" stroke-width="3"/>
<circle cx="550" cy="360" r="16" fill="#111827" stroke="#f59e0b" stroke-width="3"/>

<!-- ROUTES (BLACK) -->
<path d="M300 150 L300 60" stroke="black" stroke-width="5"/>
<path d="M600 150 L600 60" stroke="black" stroke-width="5"/>

<!-- SAM/JACK (GREEN) -->
<path d="M300 300 L300 170" stroke="#22c55e" stroke-width="5"/>
<path d="M600 300 L600 170" stroke="#22c55e" stroke-width="5"/>

<!-- CORNER (BLUE) -->
<path d="M150 260 L150 120" stroke="#38bdf8" stroke-width="4"/>
<path d="M750 260 L750 120" stroke="#38bdf8" stroke-width="4"/>

<!-- SAFETY (ORANGE) -->
<path d="M350 360 L350 180" stroke="#f59e0b" stroke-width="4"/>
<path d="M550 360 L550 180" stroke="#f59e0b" stroke-width="4"/>

</svg>
`;
}

render();

</script>
</body>
</html>
